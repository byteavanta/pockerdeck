<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PockerDeck</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="stylesheet" href="/static/css/style.css" />
  <script>
    (function() {
      try {
        var t = localStorage.getItem('pockerdeck-theme');
        if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      } catch (e) {
        // If localStorage is unavailable or blocked, fall back to default (light) theme.
      }
    })();
  </script>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark theme" aria-label="Toggle theme" aria-pressed="false">🌙</button>

  <!-- ── Name entry modal (visible by default; hidden by JS for returning users) ── -->
  <div id="name-modal" class="modal-overlay">
    <div class="modal">
      <div class="modal-emoji">🃏</div>
      <h2>Join Session</h2>
      <p>Enter your name to join the planning session</p>
      <input
        type="text"
        id="name-input"
        placeholder="Your name"
        maxlength="32"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
      />
      <div id="role-selector" class="role-selector">
        <label class="role-option">
          <input type="radio" name="role" value="user" checked />
          <span>🗳️ Participant</span>
        </label>
        <label class="role-option">
          <input type="radio" name="role" value="viewer" />
          <span>👁 Viewer</span>
        </label>
      </div>
      <button onclick="submitName()" class="btn btn-primary btn-full">Join →</button>
    </div>
  </div>

  <!-- ── Main room app (hidden until name is confirmed) ── -->
  <div id="app" class="room-layout hidden">

    <!-- Header -->
    <div class="panel room-header">
      <div>
        <h1>🃏 PockerDeck</h1>
        <div class="room-id-label">Room: <strong id="room-id-text"></strong></div>
      </div>
      <div class="header-right">
        <span id="conn-status" class="status-badge disconnected">Connecting…</span>
        <button id="copy-btn" onclick="copyLink()" class="btn btn-secondary">📋 Copy Link</button>
      </div>
    </div>

    <!-- Backlog panel -->
    <div id="backlog-panel" class="panel">
      <div class="panel-title">Backlog</div>
      <ul id="backlog-list" class="backlog-list"></ul>
      <p id="backlog-empty" class="empty-state hidden">No backlog items yet</p>
      <div id="backlog-add-row" class="backlog-add-row hidden">
        <input type="text" id="bli-room-input" placeholder="Add a backlog item…" maxlength="200" autocomplete="off" />
        <button type="button" onclick="addBliInRoom()" class="btn btn-secondary">Add</button>
      </div>
    </div>

    <!-- Story / Task description -->
    <div class="panel">
      <div class="panel-title">Story / Task</div>
      <div class="story-row">
        <textarea
          id="story-text"
          rows="2"
          placeholder="Describe the story or task you're estimating (press Enter to share)…"
        ></textarea>
        <button id="story-btn" onclick="setStory(this)" class="btn btn-secondary">Update</button>
      </div>
    </div>

    <!-- Voting cards (hidden after reveal) -->
    <div id="cards-panel" class="panel">
      <div class="panel-title">Cast Your Vote</div>
      <div id="vote-progress" class="vote-progress"></div>
      <div id="cards-grid" class="cards-grid"></div>
    </div>

    <!-- Participants -->
    <div class="panel">
      <div class="panel-title">Participants</div>
      <div id="participants" class="participants-grid"></div>
    </div>

    <!-- Results (shown after reveal) -->
    <div id="results-panel" class="panel hidden">
      <div class="panel-title">Results</div>
      <div class="results-grid">
        <div class="result-stat">
          <div id="res-avg" class="result-number">–</div>
          <div class="result-label">Average</div>
        </div>
        <div class="result-stat">
          <div id="res-min" class="result-number">–</div>
          <div class="result-label">Minimum</div>
        </div>
        <div class="result-stat">
          <div id="res-max" class="result-number">–</div>
          <div class="result-label">Maximum</div>
        </div>
      </div>
    </div>

    <!-- Action buttons -->
    <div class="controls-row">
      <button id="reveal-btn" onclick="revealVotes()" class="btn btn-primary btn-large">
        👁 Reveal Votes
      </button>
      <button id="reset-btn" onclick="newRound()" class="btn btn-success btn-large hidden">
        🔄 New Round
      </button>
    </div>

  </div><!-- /#app -->

  <footer class="app-footer"><a href="https://byteavanta.github.io/pockerdeck-doc/" target="_blank" rel="noopener noreferrer" class="footer-docs-link">Help & Docs 📖</a> · v{{ version }}</footer>

  <!-- Inject room ID and creator flag for JS before loading the script -->
  <script>
    const ROOM_ID = "{{ room_id }}";
    const IS_CREATOR = {{ 'true' if is_creator else 'false' }};
    const CARDS = {{ cards | tojson }};

    function toggleTheme() {
      var html = document.documentElement;
      var isDark = html.getAttribute('data-theme') === 'dark';
      if (isDark) {
        html.removeAttribute('data-theme');
        try { localStorage.setItem('pockerdeck-theme', 'light'); } catch (e) {}
      } else {
        html.setAttribute('data-theme', 'dark');
        try { localStorage.setItem('pockerdeck-theme', 'dark'); } catch (e) {}
      }
      syncThemeIcon();
    }
    function syncThemeIcon() {
      var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      var btn = document.querySelector('.theme-toggle');
      if (btn) {
        btn.textContent = isDark ? '☀️' : '🌙';
        btn.setAttribute('aria-pressed', isDark ? 'true' : 'false');
      }
    }
    syncThemeIcon();
  </script>
  <script src="/static/js/room.js"></script>
</body>
</html>
